<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnblockZone</title>

    <!-- Favicon link -->
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/61/61457.png" type="image/x-icon">

    <style>
        /* Prevent scrolling */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        body {
            background-color: black;
            font-family: 'Bowlby One', sans-serif;
            color: white;
            position: relative;
        }

        /* Initial overlay styles */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .instruction-box {
            background-color: rgba(30, 30, 30, 0.9);
            padding: 20px 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 0, 255, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .instruction-box:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 140, 255, 0.8);
        }

        .instruction-box h2 {
            font-size: 24px;
            color: white;
            margin-bottom: 10px;
        }

        .instruction-box p {
            font-size: 16px;
            color: #aaa;
            margin-bottom: 20px;
        }

        .instruction-button {
            padding: 10px 20px;
            background-color: #008CFF;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .instruction-button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(0, 140, 255, 0.8);
        }

        /* Floating blue dots background */
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            overflow: hidden;
        }

        .dot {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: blue;
            border-radius: 50%;
            animation: float 10s infinite;
            opacity: 0;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) scale(0.5);
                opacity: 0;
            }
            20% {
                opacity: 1;
            }
            80% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Bowlby+One&family=Roboto:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Initial overlay -->
    <div class="overlay" id="overlay">
        <div class="instruction-box">
            <h2>Allow Pop-Ups</h2>
            <p>Allow pop-ups in the top right corner of the link and press "Allow," then refresh.</p>
            <button class="instruction-button" id="instructionButton">Okay</button>
        </div>
    </div>

    <!-- Main content (hidden initially) -->
    <header>
        <h1 onclick="window.location.href='https://unblockzone.github.io/'">
            <span class="white">UNBLOCK</span><span class="blue">ZONE</span>
        </h1>
        <div class="nav-buttons">
            <a href="https://unblockzone.github.io/apps/" class="nav-button">APPS</a>
            <a href="https://unblockzone.github.io/games/" class="nav-button">GAMES</a>
            <a href="https://unblockzone.github.io/proxies/" class="nav-button">PROXIES</a>
            <a href="https://unblockzone.github.io/exploits/" class="nav-button">EXPLOITS</a>
            <a href="https://unblockzone.github.io/settings/" class="nav-button">SETTINGS</a>
            <a href="https://unblockzone.github.io/contact/" class="nav-button">CONTACT</a>
        </div>
    </header>

    <div class="subtitle-container">
        <div class="subtitle">
            <span class="white">UNBLOCK</span>
            <span class="blue">ZONE</span>
        </div>
        <input type="text" id="customSearchBar" class="custom-search-bar" placeholder="Search...">
    </div>

    <!-- Background with floating blue dots -->
    <div class="background" id="background"></div>

    <script>
        // Handle the "Okay" button click
        const overlay = document.getElementById('overlay');
        const instructionButton = document.getElementById('instructionButton');

        instructionButton.addEventListener('click', () => {
            overlay.classList.add('hidden'); // Fade out the overlay
        });

        // Generate floating blue dots
        const background = document.getElementById('background');

        function createDot() {
            const dot = document.createElement('div');
            dot.classList.add('dot');
            dot.style.left = Math.random() * 100 + '%';
            dot.style.animationDuration = Math.random() * 8 + 3 + 's';
            dot.style.animationDelay = Math.random() * 2 + 's';
            background.appendChild(dot);

            dot.addEventListener('animationend', () => {
                dot.remove();
            });
        }

        for (let i = 0; i < 100; i++) {
            createDot();
        }

        setInterval(() => {
            createDot();
        }, 500);
    </script>
</body>
</html>
