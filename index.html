<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unblockzone</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background: url('unblockzone.png') no-repeat center center/cover;
            color: white;
            text-align: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .browser-bar {
            display: flex;
            align-items: center;
            background: white;
            color: black;
            padding: 10px;
            border-radius: 10px;
            width: 60%;
            justify-content: space-between;
        }

        .browser-bar input {
            flex-grow: 1;
            margin: 0 10px;
            padding: 5px;
            border: none;
            outline: none;
            font-size: 16px;
        }

        .icons {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .icons img {
            width: 50px;
            height: 50px;
        }

        .footer {
            position: absolute;
            bottom: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="browser-bar">
        <button>←</button>
        <button>→</button>
        <button>⟳</button>
        <input type="text" placeholder="search...">
        <button>✖</button>
        <button>➕</button>
    </div>

    <h1>unblockzone</h1>

    <div class="icons">
        <img src="https://cdn-icons-png.flaticon.com/512/732/732245.png" alt="Apps">
        <img src="https://cdn-icons-png.flaticon.com/512/5356/5356896.png" alt="Games">
        <img src="https://cdn-icons-png.flaticon.com/512/888/888864.png" alt="Web">
        <img src="https://cdn-icons-png.flaticon.com/512/2871/2871415.png" alt="Files">
        <img src="https://cdn-icons-png.flaticon.com/512/3524/3524635.png" alt="Settings">
    </div>

    <div class="footer">support | 2025 ub</div>

</body>
</html>
