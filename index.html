<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnblockZone</title>

    <!-- Favicon link -->
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/61/61457.png" type="image/x-icon">
    <link rel="manifest" href="/manifest.json">

    <style>
        /* Prevent horizontal and vertical scrolling */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: linear-gradient(-45deg, black, #000011, #001122, black);
            background-size: 300% 300%;
            animation: gradientAnimation 15s ease infinite;
            font-family: 'Bowlby One', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            text-align: center;
            position: relative;
        }

        @keyframes gradientAnimation {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        header {
            background-color: #333;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 10px 20px;
            position: sticky;
            top: 0;
            z-index: 10;
            gap: 15px;
        }

        h1 {
            font-size: 50px;
            margin: 0;
            display: inline-block;
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        h1:hover {
            transform: scale(1.1);
        }

        .blue {
            color: blue;
        }

        .white {
            color: white;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-left: 20px;
        }

        .nav-button {
            background-color: black;
            color: white;
            padding: 15px 25px;
            border-radius: 20px;
            font-size: 18px;
            text-decoration: none;
            text-align: center;
            transition: transform 0.3s ease, background-color 0.3s ease, box-shadow 0.3s ease;
        }

        .nav-button:hover {
            transform: scale(1.1);
            background-color: black;
            box-shadow: 0px 0px 15px 4px #008CFF;
            color: #008CFF;
        }

        .subtitle-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            width: 100%;
            margin-top: 20px;
            position: relative;
        }

        .subtitle {
            font-size: 80px;
            display: inline-block;
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        .subtitle .blue {
            color: blue;
            font-size: 100px;
            display: block;
        }

        .subtitle:hover {
            transform: scale(1.1);
        }

        .custom-search-bar {
            font-size: 18px;
            padding: 10px 20px;
            border: none;
            border-radius: 30px;
            width: 50%;
            background-color: #555;
            color: white;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .custom-search-bar:focus {
            outline: none;
        }

        .custom-search-bar:hover {
            transform: scale(1.1);
            box-shadow: 0px 0px 20px 4px #008CFF;
        }

        /* Blue dots floating */
        .dot {
            position: absolute;
            background-color: blue;
            border-radius: 50%;
            box-shadow: 0 0 8px 4px blue;
            animation: float 12s infinite ease-in-out;
            opacity: 0.8;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) scale(0.5);
                opacity: 0.5;
            }
            20% {
                opacity: 1;
            }
            80% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) scale(1);
                opacity: 0.5;
            }
        }

        /* Open Settings Button */
        .settings-btn {
            margin-top: 30px;
            padding: 10px 20px;
            border-radius: 25px;
            background-color: transparent;
            color: white;
            font-size: 20px;
            border: 2px solid #008CFF;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .settings-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px 5px #008CFF;
            color: #008CFF;
        }

        /* Settings Dropdown */
        .settings-dropdown {
            display: none;
            margin-top: 10px;
            background-color: #333;
            border-radius: 10px;
            box-shadow: 0 0 10px 5px #008CFF;
            padding: 10px;
            width: 300px;
            text-align: left;
            transition: opacity 0.3s ease-in-out;
        }

        .settings-dropdown.show {
            display: block;
            opacity: 1;
        }

        .cloaker-option {
            background-color: #222;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .cloaker-option:hover {
            transform: scale(1.05);
            box-shadow: 0 0 10px 5px #008CFF;
        }
    </style>
</head>
<body>
    <header>
        <h1 onclick="window.location.href='https://unblockzone.github.io/'">
            <span class="white">UNBLOCK</span><span class="blue">ZONE</span>
        </h1>
        <div class="nav-buttons">
            <a href="https://unblockzone.github.io/apps/" class="nav-button">APPS</a>
            <a href="https://unblockzone.github.io/games/" class="nav-button">GAMES</a>
            <a href="https://unblockzone.github.io/proxies/" class="nav-button">PROXIES</a>
            <a href="https://unblockzone.github.io/exploits/" class="nav-button">EXPLOITS</a>
            <a href="https://unblockzone.github.io/settings/" class="nav-button">SETTINGS</a>
            <a href="https://unblockzone.github.io/contact/" class="nav-button">CONTACT</a>
        </div>
    </header>

    <div class="subtitle-container">
        <div class="subtitle">
            <span class="white">UNBLOCK</span>
            <span class="blue">ZONE</span>
        </div>
        <input type="text" id="customSearchBar" class="custom-search-bar" placeholder="Search...">
    </div>

    <!-- Open Settings Button -->
    <button class="settings-btn" onclick="toggleSettings()">Open Settings</button>

    <!-- Settings Dropdown -->
    <div class="settings-dropdown" id="settingsDropdown">
        <div class="cloaker-option" onclick="setTabCloak('Canvas', 'https://copyleaks.com/wp-content/uploads/2022/08/Canvas_Logo.webp')">
            <img src="https://copyleaks.com/wp-content/uploads/2022/08/Canvas_Logo.webp" alt="Canvas" width="40">
            Canvas
        </div>
        <div class="cloaker-option" onclick="setTabCloak('Google Drive', 'https://icons.iconarchive.com/icons/marcus-roberto/google-play/512/Google-Drive-icon.png')">
            <img src="https://icons.iconarchive.com/icons/marcus-roberto/google-play/512/Google-Drive-icon.png" alt="Google Drive" width="40">
            Google Drive
        </div>
        <div class="cloaker-option" onclick="setTabCloak('YouTube', 'https://cdn-icons-png.flaticon.com/512/1384/1384060.png')">
            <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" alt="YouTube" width="40">
            YouTube
        </div>
    </div>

    <!-- Background with floating blue dots -->
    <div class="background" id="background"></div>

    <script>
        const background = document.getElementById('background');

        // Generate floating blue dots
        function createDot() {
            const dot = document.createElement('div');
            dot.classList.add('dot');
            dot.style.left = Math.random() * 100 + '%';
            dot.style.width = dot.style.height = Math.random() * 20 + 5 + 'px'; // Sizes between 5px and 25px
            dot.style.animationDuration = Math.random() * 8 + 4 + 's';
            background.appendChild(dot);

            dot.addEventListener('animationend', () => {
                dot.remove();
            });
        }

        for (let i = 0; i < 15; i++) {
            createDot();
        }

        setInterval(() => {
            createDot();
        }, 1500);

        // Redirect to search URL
        const searchBar = document.getElementById('customSearchBar');
        searchBar.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = encodeURIComponent(searchBar.value);
                window.location.href = `https://unblockzone.github.io/google/?q=${query}`;
            }
        });

        // Toggle settings dropdown
        function toggleSettings() {
            const settingsDropdown = document.getElementById('settingsDropdown');
            settingsDropdown.classList.toggle('show');
        }

        // Set tab cloaking function
        function setTabCloak(title, iconUrl) {
            document.title = title;
            if (iconUrl) {
                const link = document.querySelector("link[rel~='icon']") || document.createElement('link');
                link.rel = 'icon';
                link.href = iconUrl;
                document.getElementsByTagName('head')[0].appendChild(link);
            }

            localStorage.setItem('tabCloak', JSON.stringify({ title, iconUrl }));
        }

        // On page load
        window.onload = function () {
            const tabCloak = JSON.parse(localStorage.getItem('tabCloak'));
            if (tabCloak) setTabCloak(tabCloak.title, tabCloak.iconUrl);
        };
    </script>
</body>
</html>
