<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnblockZone</title>

    <!-- Favicon link -->
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/61/61457.png" type="image/x-icon">

    <style>
        @font-face {
            font-family: 'Bowlby One';
            src: url('https://fonts.gstatic.com/s/bowlbyone/v13/nwpRtKu3QIswDQpbfkxHO6E.ttf') format('truetype');
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: black;
            font-family: 'Bowlby One', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            background-color: #333;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            position: sticky;
            top: 0;
            width: 100%;
            z-index: 10;
        }

        h1 {
            font-size: 40px;
            margin: 0;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        h1:hover {
            transform: scale(1.1);
        }

        .blue {
            color: blue;
        }

        .white {
            color: white;
        }

        .nav-buttons {
            display: flex;
            gap: 20px;
        }

        .nav-button {
            background-color: black;
            color: white;
            padding: 15px 25px;
            border-radius: 20px;
            font-size: 18px;
            text-decoration: none;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease, background-color 0.3s ease;
        }

        .nav-button:hover {
            transform: scale(1.1);
            box-shadow: 0px 0px 15px 4px #008CFF;
            color: #008CFF;
        }

        .logo {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.2);
        }

        .developer-notes {
            background-color: #001f3f; /* Dark blue */
            border-radius: 20px;
            padding: 20px;
            margin: 50px 0;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 0 20px rgba(0, 140, 255, 0.5); /* Blue glow */
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .developer-notes:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 140, 255, 0.8); /* Brighter blue glow on hover */
        }

        .developer-notes h2 {
            font-size: 30px;
            margin: 0;
            font-weight: bold;
            color: white;
        }

        .developer-notes p {
            font-size: 18px;
            margin-top: 10px;
            font-weight: normal;
            color: #cccccc; /* Light gray for better readability */
        }

        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            overflow: hidden;
            z-index: -1;
        }

    </style>
</head>
<body>
    <header>
        <h1 onclick="window.location.href='https://unblockzone.github.io/'">
            <span class="white">UNBLOCK</span><span class="blue">ZONE</span>
        </h1>
        <div class="nav-buttons">
            <a href="https://unblockzone.github.io/apps/" class="nav-button">APPS</a>
            <a href="https://unblockzone.github.io/games/" class="nav-button">GAMES</a>
            <a href="https://unblockzone.github.io/proxies/" class="nav-button">PROXIES</a>
            <a href="https://unblockzone.github.io/exploits/" class="nav-button">EXPLOITS</a>
            <a href="https://unblockzone.github.io/settings/" class="nav-button">SETTINGS</a>
        </div>
        <img src="https://cdn-icons-png.flaticon.com/512/61/61457.png" alt="Logo" class="logo" onclick="window.location.href='https://unblockzone.github.io/'">
    </header>

    <div class="developer-notes">
        <h2>Developer Notes</h2>
        <p>We are currently fixing the Google Situation and still trying our best to make this Website. Please note this Website is STILL being worked on. We are currently fixing the Search Problem.</p>
    </div>
</body>
</html>
