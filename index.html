<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnblockZone</title>

    <!-- Favicon link -->
    <link id="favicon" rel="icon" href="https://cdn-icons-png.flaticon.com/512/61/61457.png" type="image/x-icon">

    <style>
        /* Prevent horizontal and vertical scrolling */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        body {
            background-color: black;
            font-family: 'Bowlby One', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            text-align: center;
            position: relative;
        }

        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            color: black;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            text-align: center;
        }

        .popup h2 {
            margin-bottom: 10px;
        }

        .popup p {
            margin-bottom: 20px;
        }

        .popup input {
            padding: 10px;
            width: 80%;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .popup button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #008CFF;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .popup button:hover {
            background-color: #005a99;
        }

        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            overflow: hidden;
            z-index: -1;
        }

        .dot {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: blue;
            border-radius: 50%;
            animation: float 10s infinite;
            opacity: 0;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) scale(0.5);
                opacity: 0;
            }
            20% {
                opacity: 1;
            }
            80% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Bowlby+One&family=Roboto:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1 onclick="window.location.href='https://unblockzone.github.io/'">
            <span class="white">UNBLOCK</span><span class="blue">ZONE</span>
        </h1>
    </header>

    <div class="background" id="background"></div>

    <div class="popup" id="popup">
        <h2>Change Website Name</h2>
        <p>Here you can change the Website Tab Name.</p>
        <input type="text" id="websiteNameInput" placeholder="Enter new website name">
        <button onclick="changeWebsiteName()">Next</button>
    </div>

    <script>
        const popup = document.getElementById('popup');

        function changeWebsiteName() {
            const websiteNameInput = document.getElementById('websiteNameInput').value.trim();
            if (websiteNameInput) {
                document.title = websiteNameInput;
                popup.innerHTML = `
                    <h2>Change Tab URL</h2>
                    <p>Here you can Paste any Image URL Link into the Box.</p>
                    <input type="text" id="faviconInput" placeholder="Enter favicon image URL">
                    <button onclick="changeFavicon()">Done</button>
                `;
            }
        }

        function changeFavicon() {
            const faviconInput = document.getElementById('faviconInput').value.trim();
            if (faviconInput) {
                const faviconLink = document.getElementById('favicon');
                faviconLink.href = faviconInput;
                popup.style.display = 'none';
            }
        }

        // Generate floating blue dots
        const background = document.getElementById('background');

        function createDot() {
            const dot = document.createElement('div');
            dot.classList.add('dot');
            dot.style.left = Math.random() * 100 + '%';
            dot.style.animationDuration = Math.random() * 8 + 3 + 's';
            dot.style.animationDelay = Math.random() * 2 + 's';
            background.appendChild(dot);

            dot.addEventListener('animationend', () => {
                dot.remove();
            });
        }

        for (let i = 0; i < 100; i++) {
            createDot();
        }

        setInterval(() => {
            createDot();
        }, 500);
    </script>
</body>
</html>
