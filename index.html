<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnblockZone</title>

    <!-- Favicon link -->
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/61/61457.png" type="image/x-icon">
    <link rel="manifest" href="/manifest.json">

    <!-- Google AdSense Script -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8030500715862542" crossorigin="anonymous"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        body {
            background: rgba(35,35,35);
            background-size: 300% 300%;
            animation: gradientAnimation 15s ease infinite;
            color: white;
            display: flex;
            flex-direction: column;
            text-align: center;
            position: relative;
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        header {
            background-color: #333;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 10px 20px;
            position: sticky;
            top: 0;
            z-index: 10;
            gap: 15px;
        }

        h1 {
            font-size: 45px;
            margin: 0;
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        h1:hover {
            transform: scale(1.1);
        }

        .red { color: lightblue; }
        .white { color: white; }

        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-left: 20px;
        }

        .nav-button {
            background-color: black;
            color: white;
            padding: 15px 25px;
            border-radius: 20px;
            font-size: 18px;
            text-decoration: none;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .nav-button:hover {
            transform: scale(1.1);
            box-shadow: 0px 0px 15px 4px lightblue;
        }

        .subtitle-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            width: 100%;
            margin-top: 20px;
            position: relative;
            z-index: 1;
        }

        .subtitle {
            font-size: 70px;
            display: inline-block;
            margin-bottom: 10px;
            transition: transform 0.3s ease;
        }

        .subtitle .red {
            color: lightblue;
            font-size: 100px;
            display: block;
        }

        .subtitle .white { color: white; }

        .subtitle:hover { transform: scale(1.1); }

        .custom-search-bar {
            font-size: 18px;
            padding: 10px 20px;
            border: none;
            border-radius: 30px;
            width: 50%;
            background-color: #555;
            color: white;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0px 0px 20px 4px lightblue;
            z-index: 1;
        }

        .custom-search-bar:focus { outline: none; }
        .custom-search-bar:hover { transform: scale(1.1); }

        .coolBlobIdk {
            position: absolute;
            bottom: -30%;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 400px;
            background: linear-gradient(135deg, rgba(128, 0, 128, 0.6), rgba(255, 0, 255, 0.5), rgba(100, 0, 255, 0.6), rgba(0, 255, 255, 0.4), rgba(200, 0, 200, 0.6));
            border-radius: 50%;
            filter: blur(100px);
            box-shadow: 0 0 120px rgba(255, 0, 255, 0.5);
            z-index: -1;
        }

        .fade-text {
            font-family: Arial, sans-serif;
            font-size: 18px;
            color: white;
            opacity: 0;
            animation: fadeInOut 5s infinite, waveMotion 2s ease-in-out infinite alternate;
            margin-top: 10px;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { opacity: 0; }
        }

        @keyframes waveMotion {
            0% { transform: translateY(0px); }
            100% { transform: translateY(5px); }
        }
    </style>
</head>
<body>
    <div class="coolBlobIdk"></div>
    <header>
        <h1 id="header-title" onclick="window.location.href='https://unblockzone.github.io/'">
            <span class="white">UNBLOCK</span><span class="red">ZONE</span>
        </h1>
        <div class="nav-buttons">
            <a href="https://unblockzone.github.io/apps/" class="nav-button">APPS</a>
            <a href="https://unblockzone.github.io/games/" class="nav-button">GAMES</a>
            <a href="https://unblockzone.github.io/proxies/" class="nav-button">PROXIES</a>
            <a href="https://unblockzone.github.io/exploits/" class="nav-button">EXPLOITS</a>
            <a href="https://unblockzone.github.io/settings/" class="nav-button">SETTINGS</a>
            <a href="https://unblockzone.github.io/contact/" class="nav-button">CONTACT</a>
        </div>
    </header>

    <!-- Fading text under header -->
    <div id="fadeText1" class="fade-text"></div>

    <div class="subtitle-container">
        <div class="subtitle" id="subtitle">
            <span class="white">UNBLOCK</span>
            <span class="red">ZONE</span>
        </div>

        <!-- Fading text under "UNBLOCKZONE" -->
        <div id="fadeText2" class="fade-text"></div>

        <input type="text" id="customSearchBar" class="custom-search-bar" placeholder="Search..." onkeypress="handleSearch(event)">

        <!-- Fading text under search bar -->
        <div id="fadeText3" class="fade-text"></div>
    </div>

    <script>
        function handleSearch(event) {
            if (event.key === 'Enter') {
                const query = document.getElementById('customSearchBar').value.trim();
                if (query) {
                    window.location.href = `https://unblockzone.github.io/google-search/?q=${encodeURIComponent(query)}`;
                }
            }
        }

        const phrases = [
            "where are we...",
            "made by braybray...",
            "victor sandytoes...",
            "skibidi toilet...",
            "this is cool..."
        ];

        let currentPhraseIndex = 0;
        function changeText() {
            document.getElementById("fadeText1").textContent = phrases[currentPhraseIndex];
            document.getElementById("fadeText2").textContent = phrases[currentPhraseIndex];
            document.getElementById("fadeText3").textContent = phrases[currentPhraseIndex];

            currentPhraseIndex = (currentPhraseIndex + 1) % phrases.length;
        }

        setInterval(changeText, 5000);
    </script>
</body>
</html>
